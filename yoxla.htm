<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Məhsul İdarəetməsi</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>

    <!-- ✅ DÜZƏLDİLDİ: header düzgün bağlandı, ul daxilə alındı -->
    <header class="flex items-center justify-between px-6 py-3 bg-white shadow-sm">

        <!-- Logo / Brend -->
        <span class="text-lg font-bold text-slate-900">🛒 Mağaza</span>

        <!-- Mobil hamburger düyməsi -->
        <button id="toggleOpen" onclick="openDrawer()" class="lg:hidden cursor-pointer">
            <svg class="w-7 h-7" fill="#333" viewBox="0 0 20 20">
                <path fill-rule="evenodd"
                    d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"
                    clip-rule="evenodd"></path>
            </svg>
        </button>

        <!-- Desktop navbar — ✅ DÜZƏLDİLDİ: header içinə alındı, artıq </div> silindi -->
        <ul class="lg:flex lg:gap-x-1 max-lg:hidden z-50">
            <li onclick="getAdd()" class="px-3">
                <button
                    class="inline-flex items-center gap-2 px-4 py-2 bg-slate-900 hover:bg-slate-800 text-white text-sm font-semibold rounded-full shadow-md hover:shadow-lg hover:-translate-y-0.5 active:scale-95 transition-all duration-200 cursor-pointer">
                    <span
                        class="w-5 h-5 bg-red-500 rounded-full flex items-center justify-center text-base font-bold leading-none">+</span>
                    <span>Məhsul əlavə et</span>
                </button>
            </li>
            <li onclick="getDelete()" class="px-3">
                <button
                    class="inline-flex items-center gap-2 px-4 py-2 bg-white hover:bg-red-50 text-red-500 border-2 border-red-500 hover:border-red-600 text-sm font-semibold rounded-full shadow-md hover:shadow-lg hover:-translate-y-0.5 active:scale-95 transition-all duration-200 cursor-pointer">
                    <span class="w-5 h-5 bg-red-500 rounded-full flex items-center justify-center leading-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 fill-none stroke-white stroke-2"
                            viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
                            <path d="M10 11v6m4-6v6" />
                            <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2" />
                        </svg>
                    </span>
                    <span>Məhsulu sil</span>
                </button>
            </li>
        </ul>

    </header>
    <!-- ✅ header burada düzgün bağlandı -->

    <!-- Overlay -->
    <div id="menuOverlay" class="hidden fixed inset-0 bg-black bg-opacity-60 z-40 lg:hidden" onclick="closeDrawer()">
    </div>

    <!-- Drawer -->
    <div id="menuDrawer"
        class="fixed top-0 right-0 h-full w-60 bg-white z-50 shadow-lg flex flex-col translate-x-full transition-transform duration-300 ease-in-out lg:hidden">

        <!-- Header -->
        <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
            <span class="text-sm font-semibold text-slate-900">Menyu</span>
            <button onclick="closeDrawer()"
                class="w-7 h-7 rounded-md bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 text-base cursor-pointer border-none">
                ✕
            </button>
        </div>

        <!-- Body -->
        <div class="flex-1 py-2">

            <!-- Ana səhifə -->
            <button onclick="window.location.href='index.htm'"
                class="flex items-center gap-3 w-full px-5 py-2.5 hover:bg-gray-50 transition-colors cursor-pointer border-none bg-transparent text-left">
                <span
                    class="w-8 h-8 rounded-lg bg-gray-50 border border-gray-100 flex items-center justify-center flex-shrink-0">
                    <svg width="16" height="16" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                </span>
                <span class="text-sm font-medium text-slate-900">Ana səhifə</span>
            </button>

            <!-- Məhsul əlavə et -->
            <button onclick="getAdd()"
                class="flex items-center gap-3 w-full px-5 py-2.5 hover:bg-gray-50 transition-colors cursor-pointer border-none bg-transparent text-left">
                <span class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center flex-shrink-0">
                    <svg width="16" height="16" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" viewBox="0 0 24 24">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                </span>
                <span class="text-sm font-medium text-slate-900">Məhsul əlavə et</span>
            </button>

            <!-- Məhsul sil -->
            <button onclick="getDelete()"
                class="flex items-center gap-3 w-full px-5 py-2.5 hover:bg-gray-50 transition-colors cursor-pointer border-none bg-transparent text-left">
                <span class="w-8 h-8 rounded-lg bg-red-50 flex items-center justify-center flex-shrink-0">
                    <svg width="16" height="16" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" viewBox="0 0 24 24">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
                        <path d="M10 11v6m4-6v6" />
                        <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2" />
                    </svg>
                </span>
                <span class="text-sm font-medium text-slate-900">Məhsul sil</span>
            </button>

        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // AOS inisializasiyası
        AOS.init();

        // Drawer funksiyaları
        function openDrawer() {
            document.getElementById('menuDrawer').classList.remove('translate-x-full');
            document.getElementById('menuOverlay').classList.remove('hidden');
        }

        function closeDrawer() {
            document.getElementById('menuDrawer').classList.add('translate-x-full');
            document.getElementById('menuOverlay').classList.add('hidden');
        }

        // ✅ DÜZƏLDİLDİ: Çatışmayan funksiyalar əlavə edildi
        function getAdd() {
            // Məhsul əlavə etmə məntiqi buraya yazılacaq
            alert('Məhsul əlavə et funksiyası');
        }

        function getDelete() {
            // Məhsul silmə məntiqi buraya yazılacaq
            alert('Məhsul sil funksiyası');
        }
    </script>
</body>

</html>
